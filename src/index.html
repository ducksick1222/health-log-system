<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧健康日誌與風險評估系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 sm:px-6 lg:px-8">

    <div class="max-w-5xl mx-auto space-y-8">
        
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">智慧健康日誌與風險評估系統</h1>
            <p class="mt-3 max-w-2xl mx-auto text-xl text-gray-500 sm:mt-4">
                後端決策樹即時分析風險狀態
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-1 h-fit">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">記錄今日健康數據</h2>
                <form id="healthForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">紀錄日期</label>
                        <input type="date" id="log_date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">睡眠時數 (小時)</label>
                        <input type="number" step="0.1" id="sleep_hours" placeholder="例如: 7.5" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">當日步數</label>
                        <input type="number" id="steps" placeholder="running: 8000" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">心情分數 (1~10分)</label>
                        <input type="number" min="1" max="10" id="mood_score" placeholder="1 (極差) ~ 10 (極好)" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
                    </div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        送出數據並即時評估
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-2">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold text-gray-800">歷史紀錄趨勢列表</h2>
                    <button onclick="loadHealthLogs()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-600 py-1 px-3 rounded border">
                        🔄 重新整理
                    </button>
                </div>
                
                <div class="overflow-x-auto max-h-[500px]">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">日期</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">睡眠</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">步數</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">心情</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">風險等級</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody" class="bg-white divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = 'https://health-log-system-0603.onrender.com/health-logs';

        document.getElementById('log_date').value = new Date().toISOString().split('T')[0];

        window.onload = function() {
            loadHealthLogs();
        };

        // 1. 取得所有紀錄 (GET /health-logs)
        async function loadHealthLogs() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const tbody = document.getElementById('logsTableBody');
                tbody.innerHTML = ''; 

                data.forEach(log => {
                    const tr = document.createElement('tr');
                    
                    let badgeHTML = '';
                    if (log.risk_level === 'Low') {
                        badgeHTML = `<span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">🟢 Low</span>`;
                    } else if (log.risk_level === 'Medium') {
                        badgeHTML = `<span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">🟡 Medium</span>`;
                    } else if (log.risk_level === 'High') {
                        badgeHTML = `<span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">🔴 High</span>`;
                    } else {
                        badgeHTML = `<span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">未評估</span>`;
                    }

                    // 💡 在每一行後面加上一個 🗑️ 刪除按鈕
                    tr.innerHTML = `
                        <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900">${log.log_date}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500">${log.sleep_hours} 小時</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500">${log.steps.toLocaleString()} 步</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500">${log.mood_score} 分</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm">${badgeHTML}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-sm">
                            <button onclick="deleteLog(${log.id})" class="text-red-600 hover:text-red-900 font-medium">🗑️ 刪除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('讀取資料失敗:', error);
            }
        }

        // 2. 送出新增表單 (POST /health-logs)
        document.getElementById('healthForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payload = {
                log_date: document.getElementById('log_date').value,
                sleep_hours: parseFloat(document.getElementById('sleep_hours').value),
                steps: parseInt(document.getElementById('steps').value),
                mood_score: parseInt(document.getElementById('mood_score').value)
            };
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    document.getElementById('sleep_hours').value = '';
                    document.getElementById('steps').value = '';
                    document.getElementById('mood_score').value = '';
                    loadHealthLogs();
                }
            } catch (error) { console.error(error); }
        });

        // 3. 測試新補齊的後端端點：刪除指定日誌 (DELETE /health-logs/:id)
        async function deleteLog(id) {
            if (!confirm('確定要刪除這筆紀錄嗎？（這將測試後端 DELETE API）')) return;

            try {
                // 發送請求到 http://localhost:8080/health-logs/{id}
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('🎉 後端 DELETE 響應成功，資料已從 MySQL 抹除！');
                    loadHealthLogs(); // 重新整理列表
                } else {
                    alert('刪除失敗，後端未正確響應');
                }
            } catch (error) {
                console.error('發送刪除請求失敗:', error);
                alert('連線失敗，請確認 Java 後端是否在執行中');
            }
        }
    </script>
</body>
</html>
